root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd/app"
  bin = "./tmp/main"
  include_ext = ["go", "tpl", "tmpl", "html", "css", "js", "json", "yaml", "yml"]
  exclude_dir = ["tmp", "vendor", "bin", ".git"]
  delay = 200
  stop_on_error = true
  send_interrupt = true

[log]
  time = true

[screen]
  clear_on_rebuild = true
