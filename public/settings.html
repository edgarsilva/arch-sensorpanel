<!DOCTYPE html>
<html lang="en" data-theme="winter">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Panel Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="min-h-screen bg-base-200">
    <main class="mx-auto w-full max-w-4xl p-4 md:p-8">
      <div class="mb-6 flex items-center justify-between">
        <h1 class="text-2xl font-bold">Panel Settings</h1>
        <a href="/" class="btn btn-ghost btn-sm">Open Panel</a>
      </div>

      <div class="grid gap-6 md:grid-cols-[1.2fr_1fr]">
        <section class="card bg-base-100 shadow-sm">
          <div class="card-body">
            <h2 class="card-title text-lg">Create or edit</h2>
            <form id="settings_form" class="space-y-4">
              <label class="form-control w-full">
                <span class="label-text mb-1">Layout</span>
                <select id="layout_name" class="select select-bordered w-full">
                  <option value="left">Left</option>
                  <option value="right">Right</option>
                  <option value="center">Center</option>
                </select>
              </label>

              <label class="form-control w-full">
                <span class="label-text mb-1">Layout path (optional)</span>
                <input id="layout_path" class="input input-bordered w-full" placeholder="/layouts/center-v2" />
              </label>

              <label class="form-control w-full">
                <span class="label-text mb-1">Media kind</span>
                <select id="media_kind" class="select select-bordered w-full">
                  <option value="youtube">youtube</option>
                  <option value="video">video</option>
                  <option value="playlist">playlist</option>
                </select>
              </label>

              <label class="form-control w-full">
                <span class="label-text mb-1">Video URL or YouTube ID</span>
                <input id="media_url" class="input input-bordered w-full" placeholder="https://www.youtube.com/watch?v=AKfsikEXZHM" required />
              </label>

              <label class="form-control w-full">
                <span class="label-text mb-1">Media label (optional)</span>
                <input id="media_label" class="input input-bordered w-full" placeholder="Winter loop" />
              </label>

              <div class="flex items-center gap-3">
                <button type="submit" class="btn btn-primary">Save version</button>
                <a href="/settings/new" class="btn btn-ghost">New</a>
                <span id="form_status" class="text-sm text-base-content/70"></span>
              </div>
            </form>
          </div>
        </section>

        <section class="card bg-base-100 shadow-sm">
          <div class="card-body">
            <h2 class="card-title text-lg">History</h2>
            <div id="settings_list" class="space-y-2 text-sm"></div>
          </div>
        </section>
      </div>
    </main>

    <script>
      const listEl = document.getElementById("settings_list")
      const form = document.getElementById("settings_form")
      const statusEl = document.getElementById("form_status")

      const idFromPath = (() => {
        const match = window.location.pathname.match(/^\/settings\/(\d+)\/edit$/)
        return match ? Number(match[1]) : null
      })()

      function toPayload() {
        return {
          config: {
            layout: {
              name: document.getElementById("layout_name").value,
              path: document.getElementById("layout_path").value.trim(),
            },
            media_sources: [
              {
                kind: document.getElementById("media_kind").value,
                url: document.getElementById("media_url").value.trim(),
                label: document.getElementById("media_label").value.trim(),
              },
            ],
          },
        }
      }

      async function loadList() {
        const res = await fetch("/api/settings")
        const data = await res.json()
        const items = Array.isArray(data.items) ? data.items : []

        listEl.innerHTML = ""
        for (const item of items) {
          const row = document.createElement("div")
          row.className = "rounded-lg border border-base-300 p-2"
          const currentBadge = item.is_current ? '<span class="badge badge-success badge-sm ml-2">current</span>' : ""
          row.innerHTML = `<div class="flex items-center justify-between"><div><strong>v${item.version}</strong>${currentBadge}</div><a class="link" href="/settings/${item.id}/edit">edit</a></div><div class="text-xs text-base-content/70 mt-1">layout: ${item.config?.layout?.name || "--"}</div>`
          listEl.appendChild(row)
        }
      }

      async function loadEdit() {
        if (!idFromPath) return
        const res = await fetch(`/api/settings/${idFromPath}`)
        if (!res.ok) return
        const item = await res.json()
        document.getElementById("layout_name").value = item.config?.layout?.name || "left"
        document.getElementById("layout_path").value = item.config?.layout?.path || ""
        const firstMedia = Array.isArray(item.config?.media_sources) ? item.config.media_sources[0] : null
        if (firstMedia) {
          document.getElementById("media_kind").value = firstMedia.kind || "youtube"
          document.getElementById("media_url").value = firstMedia.url || ""
          document.getElementById("media_label").value = firstMedia.label || ""
        }
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault()
        statusEl.textContent = "saving..."

        const method = idFromPath ? "PATCH" : "POST"
        const url = idFromPath ? `/api/settings/${idFromPath}` : "/api/settings"

        const res = await fetch(url, {
          method,
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(toPayload()),
        })

        if (!res.ok) {
          const txt = await res.text()
          statusEl.textContent = `error: ${txt}`
          return
        }

        const saved = await res.json()
        statusEl.textContent = `saved version v${saved.version}`
        window.history.replaceState({}, "", `/settings/${saved.id}/edit`)
        await loadList()
      })

      Promise.all([loadList(), loadEdit()]).catch(() => {
        statusEl.textContent = "failed to load settings"
      })
    </script>
  </body>
</html>
