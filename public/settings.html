<!DOCTYPE html>
<html lang="en" data-theme="winter">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Panel Settings</title>
    <link rel="icon" type="image/svg+xml" href="/public/favicon.svg" />
    <link rel="alternate icon" type="image/png" href="/public/favicon.png" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="min-h-screen bg-base-200">
    <main class="mx-auto w-full max-w-4xl p-4 md:p-8">
      <div class="mb-6 flex items-center justify-between">
        <h1 class="text-2xl font-bold">Panel Settings</h1>
        <a href="/" target="_blank" rel="noopener noreferrer" class="btn btn-ghost btn-sm">Open Panel</a>
      </div>

      <div class="grid gap-6 md:grid-cols-[1.2fr_1fr]">
        <section class="card bg-base-100 shadow-sm">
          <div class="card-body">
            <h2 class="card-title text-lg">Create or edit</h2>
            <form id="settings_form" class="space-y-5" method="post">
              <fieldset class="fieldset w-full">
                <legend class="fieldset-legend">Overlay position</legend>
                <select id="layout_name" class="select select-bordered w-full">
                  <option value="left">Left</option>
                  <option value="right">Right</option>
                  <option value="center">Center</option>
                  <option value="cover">Cover</option>
                </select>
              </fieldset>

              <fieldset class="fieldset w-full">
                <legend class="fieldset-legend">Overlay layout</legend>
                <select id="overlay_layout" class="select select-bordered w-full">
                  <option value="column">Column</option>
                  <option value="row">Row</option>
                </select>
              </fieldset>

              <fieldset class="fieldset w-full">
                <legend class="fieldset-legend">Theme</legend>
                <select id="theme" class="select select-bordered w-full">
                  <option value="cool">cool</option>
                  <option value="winter">winter</option>
                  <option value="corporate">corporate</option>
                  <option value="nord">nord</option>
                  <option value="aqua">aqua</option>
                  <option value="lofi">lofi</option>
                  <option value="business">business</option>
                  <option value="dark">dark</option>
                  <option value="dim">dim</option>
                </select>
              </fieldset>

              <fieldset class="fieldset w-full">
                <legend class="fieldset-legend">Video fit</legend>
                <select id="video_fit" class="select select-bordered w-full">
                  <option value="cover">cover</option>
                  <option value="contain">contain</option>
                </select>
              </fieldset>

              <fieldset class="fieldset w-full">
                <legend class="fieldset-legend">Contain align</legend>
                <select id="video_align" class="select select-bordered w-full">
                  <option value="left">left</option>
                  <option value="center">center</option>
                  <option value="right">right</option>
                </select>
              </fieldset>

              <fieldset class="fieldset w-full">
                <legend class="fieldset-legend">Media kind</legend>
                <select id="media_kind" class="select select-bordered w-full">
                  <option value="youtube">youtube</option>
                  <option value="video">video</option>
                  <option value="playlist">playlist</option>
                </select>
              </fieldset>

              <fieldset class="fieldset w-full">
                <legend class="fieldset-legend">Video URL or YouTube ID</legend>
                <input id="media_url" class="input input-bordered w-full" placeholder="https://www.youtube.com/watch?v=AKfsikEXZHM" required />
              </fieldset>

              <fieldset class="fieldset w-full">
                <legend class="fieldset-legend">Media label (optional)</legend>
                <input id="media_label" class="input input-bordered w-full" placeholder="Winter loop" />
              </fieldset>

              <div class="flex items-center gap-3">
                <button type="submit" class="btn btn-primary">Save version</button>
                <a href="/settings/new" class="btn btn-ghost">New</a>
                <span id="form_status" class="text-sm text-base-content/70"></span>
              </div>
            </form>
          </div>
        </section>

        <section class="card bg-base-100 shadow-sm">
          <div class="card-body">
            <h2 class="card-title text-lg">History</h2>
            <ul id="settings_list" class="list bg-base-100 rounded-box border border-base-300 text-sm"></ul>
          </div>
        </section>
      </div>
    </main>

    <script>
      const listEl = document.getElementById("settings_list")
      const form = document.getElementById("settings_form")
      const statusEl = document.getElementById("form_status")

      const idFromPath = (() => {
        const match = window.location.pathname.match(/^\/settings\/(\d+)\/edit$/)
        return match ? Number(match[1]) : null
      })()

      if (idFromPath) {
        form.setAttribute("action", `/settings/${idFromPath}`)
      } else {
        form.setAttribute("action", "/settings")
      }

      function toPayload() {
        return {
          config: {
            layout: {
              name: document.getElementById("layout_name").value,
              overlay_layout: document.getElementById("overlay_layout").value,
              theme: document.getElementById("theme").value,
              video_fit: document.getElementById("video_fit").value,
              video_align: document.getElementById("video_align").value,
            },
            media_sources: [
              {
                kind: document.getElementById("media_kind").value,
                url: document.getElementById("media_url").value.trim(),
                label: document.getElementById("media_label").value.trim(),
              },
            ],
          },
        }
      }

      async function loadList() {
        const res = await fetch("/api/settings")
        const data = await res.json()
        const items = Array.isArray(data.items) ? data.items : []

        listEl.innerHTML = '<li class="p-4 pb-2 text-xs opacity-60 tracking-wide">Settings versions</li>'

        if (items.length === 0) {
          const empty = document.createElement("li")
          empty.className = "list-row"
          empty.innerHTML = '<div><div class="font-medium">No versions yet</div><div class="text-xs opacity-60">Create your first settings version.</div></div>'
          listEl.appendChild(empty)
          return
        }

        for (const item of items) {
          const row = document.createElement("li")
          row.className = "list-row"
          const currentBadge = item.is_current ? '<span class="badge badge-success badge-sm">current</span>' : '<span class="badge badge-ghost badge-sm">history</span>'
          const mediaCount = Array.isArray(item.config?.media_sources) ? item.config.media_sources.length : 0
          row.innerHTML = `<div class="flex flex-col"><div class="font-semibold">v${item.version}</div><div class="text-xs uppercase font-semibold opacity-60">layout ${item.config?.layout?.name || "--"} · media ${mediaCount}</div></div><div class="flex items-center justify-end gap-2">${currentBadge}<a class="btn btn-xs btn-ghost" href="/settings/${item.id}/edit">edit</a></div>`
          listEl.appendChild(row)
        }
      }

      async function loadEdit() {
        if (!idFromPath) return
        const res = await fetch(`/api/settings/${idFromPath}`)
        if (!res.ok) return
        const item = await res.json()
        document.getElementById("layout_name").value = item.config?.layout?.name || "left"
        document.getElementById("overlay_layout").value = item.config?.layout?.overlay_layout || "column"
        document.getElementById("theme").value = item.config?.layout?.theme || "lofi"
        document.getElementById("video_fit").value = item.config?.layout?.video_fit || "cover"
        document.getElementById("video_align").value = item.config?.layout?.video_align || "center"
        const firstMedia = Array.isArray(item.config?.media_sources) ? item.config.media_sources[0] : null
        if (firstMedia) {
          document.getElementById("media_kind").value = firstMedia.kind || "youtube"
          document.getElementById("media_url").value = firstMedia.url || ""
          document.getElementById("media_label").value = firstMedia.label || ""
        }
      }

      form.addEventListener("submit", (e) => {
        e.preventDefault()
        statusEl.textContent = "saving..."

        const payload = toPayload()
        const cfg = payload.config

        const hidden = [
          ["layout_name", cfg.layout.name],
          ["overlay_layout", cfg.layout.overlay_layout || "column"],
          ["theme", cfg.layout.theme || "lofi"],
          ["video_fit", cfg.layout.video_fit || "cover"],
          ["video_align", cfg.layout.video_align || "center"],
          ["media_kind", (cfg.media_sources[0] && cfg.media_sources[0].kind) || ""],
          ["media_url", (cfg.media_sources[0] && cfg.media_sources[0].url) || ""],
          ["media_label", (cfg.media_sources[0] && cfg.media_sources[0].label) || ""],
        ]

        if (idFromPath) {
          hidden.push(["_method", "PATCH"])
        }

        for (const [name, value] of hidden) {
          let input = form.querySelector(`input[type="hidden"][name="${name}"]`)
          if (!input) {
            input = document.createElement("input")
            input.type = "hidden"
            input.name = name
            form.appendChild(input)
          }
          input.value = String(value)
        }

        form.submit()
      })

      Promise.all([loadList(), loadEdit()]).catch(() => {
        statusEl.textContent = "failed to load settings"
      })
    </script>
  </body>
</html>
