<!DOCTYPE html>
<html data-theme="lofi">
  <!-- some good themes for cool winter, corporate, nord, aqua, lofi, business, dark, dim -->
  <head>
    <meta charset="utf-8" />
    <title>Sensor Panel</title>
    <link rel="icon" type="image/svg+xml" href="/public/favicon.svg" />
    <link rel="alternate icon" type="image/png" href="/public/favicon.png" />
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: white;
        overflow: hidden;
      }

      .video-cover {
        display: flex;
        align-items: center;
      }

      .video-cover.video-align-left {
        justify-content: flex-start;
      }

      .video-cover.video-align-center {
        justify-content: center;
      }

      .video-cover.video-align-right {
        justify-content: flex-end;
      }

      /* 16:9 cover math */
      .video-cover.video-fit-cover #player {
        position: absolute;
        top: 50%;
        left: 50%;

        /* Maintain aspect ratio */
        width: 177.78vh; /* 16 / 9 * 100 */
        height: 100vh;

        min-width: 100vw;
        min-height: 56.25vw; /* 9 / 16 * 100 */

        transform: translate(calc(-50% + var(--video-offset-x, 0px)), calc(-50% + var(--video-offset-y, 0px)));
      }

      .video-cover.video-fit-contain #player {
        position: relative;
        width: 100vw;
        height: 56.25vw;
        max-height: 100vh;
        max-width: 177.78vh;
        transform: translate(var(--video-offset-x, 0px), var(--video-offset-y, 0px));
      }

      /* Firefox */
      progress#cpu_temp_progress::-moz-progress-bar {
        background-color: var(--cpu-temp-color);
        transition: background-color 300ms linear;
      }

      /* Chromium / WebKit */
      progress#cpu_temp_progress::-webkit-progress-value {
        background-color: var(--cpu-temp-color);
        transition: background-color 300ms linear;
      }

      /* Firefox */
      progress#gpu_temp_progress::-moz-progress-bar {
        background-color: var(--gpu-temp-color);
        transition: background-color 300ms linear;
      }

      /* Chromium / WebKit */
      progress#gpu_temp_progress::-webkit-progress-value {
        background-color: var(--gpu-temp-color);
        transition: background-color 300ms linear;
      }

    </style>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div class="video-cover video-fit-cover video-align-center fixed inset-0 overflow-hidden">
      <div id="player"></div>
    </div>

    <div class="fixed left-4 bottom-4 z-[60] pointer-events-none">
      <div class="flex items-center gap-2 rounded-full bg-base-200/25 px-3 py-1.5 backdrop-blur-sm">
        <span class="relative inline-flex size-3">
          <span id="conn_ping" class="absolute inline-flex h-full w-full rounded-full bg-success opacity-60 animate-ping"></span>
          <span id="conn_dot" class="relative inline-flex size-3 rounded-full bg-success"></span>
        </span>
        <span id="conn_text" class="text-xs font-medium text-base-content/80">live</span>
      </div>
    </div>

    <div id="playlist_controls" class="fixed right-4 bottom-4 z-[60] hidden">
      <div class="flex items-center gap-2 rounded-full bg-base-200/25 px-2 py-1.5 backdrop-blur-sm shadow-sm">
        <button id="playlist_prev" type="button" class="btn btn-circle btn-xs btn-ghost text-base-content/80" aria-label="Previous playlist video">&lt;</button>
        <button id="playlist_next" type="button" class="btn btn-circle btn-xs btn-ghost text-base-content/80" aria-label="Next playlist video">&gt;</button>
      </div>
    </div>

    <div id="overlay_panel" class="fixed inset-0 flex items-center z-50 pointer-events-none justify-start">
      <div id="overlay_slot" class="flex flex-col items-start justify-center gap-6 h-full bg-white/35 rounded-2xl px-8 py-2">
        <div class="flex items-center">
          <!-- CPU Power (RADIAL) -->
          <div class="flex flex-col items-center mr-1">
            <div
              id="cpu_util"
              class="radial-progress text-primary bg-secondary/30"
              style="--value:0; --size:5.2rem; --thickness:6px;"
              role="progressbar">
              <span id="cpu_util_text" class="text-lg font-semibold text-base-content/80">--w</span>
            </div>
          </div>

          <!-- CPU STAT -->
          <div class="stat gap-2">
            <div class="stat-figure text-primary p-4">
              <!-- CPU icon -->
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                class="inline-block size-16 stroke-current">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M9 2v2M15 2v2M9 20v2M15 20v2M2 9h2M2 15h2M20 9h2M20 15h2M6 6h12v12H6z" />
              </svg>
            </div>

            <div id="cpu_power" class="stat-title text-lg font-semibold">CPU (--W)</div>

            <div class="stat-value text-4xl leading-none">
              <span id="cpu_temp">--</span>
              <span class="text-lg align-top">°C</span>
            </div>

            <div id="" class="stat-desc flex flex-col text-base">
              <progress
                id="cpu_temp_progress"
                class="progress w-48 h-1 mb-2"
                value="0"
                max="95">
              </progress>

              <div id="ram_desc" class="stat-desc text-base">
                RAM --gb/--gb
              </div>

              <progress
                id="ram_progress"
                class="progress progress-primary w-48 h-1"
                value="39"
                max="95">
              </progress>
            </div>
          </div>
        </div>

        <div class="flex items-center gap-2">
          <!-- GPU UTIL (RADIAL) -->
          <div class="flex flex-col items-center">
            <div
              id="gpu_util"
              class="radial-progress text-primary bg-secondary/30"
              style="--value:0; --size:5.2rem; --thickness:6px;"
              role="progressbar">
              <span id="gpu_util_text" class="text-lg font-semibold text-base-content/80">--°</span>
            </div>
          </div>

          <!-- GPU STAT -->
          <div class="stat">
            <div class="stat-figure text-primary p-4">
              <!-- GPU icon -->
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                class="inline-block size-16 stroke-current">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16v8H4zM6 14v4h4v-4M14 14v4h4v-4M9 10h.01M12 10h.01M15 10h.01" />
              </svg>
            </div>

            <div id="gpu_power" class="stat-title text-lg font-semibold">GPU</div>

            <div class="stat-value text-4xl leading-none">
              <span id="gpu_hotspot">--</span>
              <span class="text-lg align-top">°C</span>
              <span id="vram_temp" class="text-sm font-normal text-base-content/70">°C</span>
            </div>

            <div id="" class="stat-desc flex flex-col text-base">
              <progress
                id="gpu_temp_progress"
                class="progress progress-error w-48 h-1 mb-2"
                value="0"
                max="110">
              </progress>

              <span id="gpu_desc">VRAM --GB · --°C</span>

              <progress
                id="gpu_progress"
                class="progress progress-primary w-48 h-1"
                value="00"
                max="110">
              </progress>

            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="/public/js/panel.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
  </body>
</html>
